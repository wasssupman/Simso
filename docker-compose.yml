version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: simso-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: simso
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d simso"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    name: simso-postgres-data
